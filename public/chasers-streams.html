<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ChasersStreams — manage and view storm chaser YouTube livestreams in quad view"
    />
    <title>Streams · HeartlandStormChaser</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/chasers-streams.css" />
  </head>
  <body data-page="chasers-streams" class="chasers-body">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-logo" href="/">HeartlandStormChaser</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="/" data-nav="dashboard">Dashboard</a>
          <a class="nav-link" href="/gps.html" data-nav="gps">GPS</a>
          <a class="nav-link" href="/warnings.html" data-nav="warnings">Warnings</a>
          <a class="nav-link" href="/weatherfront.html" data-nav="weatherfront">WeatherFront</a>
          <a class="nav-link" href="/overlays.html" data-nav="overlays">Overlays</a>
          <a class="nav-link" href="/weatherfront/" data-nav="weatherfront">WeatherFront</a>
          <a class="nav-link" href="/chases.html" data-nav="chases">Chases</a>
          <a class="nav-link" href="/chasers-streams.html" data-nav="chasers-streams">Streams</a>
          <a class="nav-link" href="/broadcast/control/" data-nav="broadcast">Broadcast</a>
        </nav>
      </div>
    </header>

    <main class="site-main site-main--wide chasers-main">
      <div class="chasers-toolbar">
        <div class="chasers-toolbar__status">
          <span id="refresh-status" class="chasers-toolbar__text">Live status not checked yet.</span>
        </div>
        <div class="chasers-toolbar__actions">
          <button type="button" class="btn btn--primary" id="refresh-live-btn">
            Refresh live status
          </button>
          <button type="button" class="btn btn--secondary" id="refresh-live-force-btn" title="Bypass 2-minute cache">
            Force refresh
          </button>
        </div>
      </div>

      <div class="chasers-layout">
        <aside class="stream-admin" aria-label="Stream admin">
          <div class="stream-admin__panel">
            <div class="stream-admin__tabs" role="tablist" aria-label="Stream admin sections">
              <button
                type="button"
                class="stream-admin__tab stream-admin__tab--active"
                id="tab-streamers"
                role="tab"
                aria-selected="true"
                aria-controls="panel-streamers"
              >
                All streamers
              </button>
              <button
                type="button"
                class="stream-admin__tab"
                id="tab-add-stream"
                role="tab"
                aria-selected="false"
                aria-controls="panel-add-stream"
                tabindex="-1"
              >
                Add stream
              </button>
            </div>

            <div
              class="stream-admin__tab-panel stream-admin__tab-panel--active"
              id="panel-streamers"
              role="tabpanel"
              aria-labelledby="tab-streamers"
            >
              <div id="stream-list" class="stream-list">
                <p class="stream-list__empty">Loading streamers…</p>
              </div>
            </div>

            <div
              class="stream-admin__tab-panel"
              id="panel-add-stream"
              role="tabpanel"
              aria-labelledby="tab-add-stream"
              hidden
            >
              <h2 class="stream-admin__title" id="form-title">Add stream</h2>
              <form id="stream-form" class="stream-form">
                <input type="hidden" id="source-id" name="source_id" value="" />
                <div class="form-field">
                  <label for="display-name">Display name</label>
                  <input
                    id="display-name"
                    name="display_name"
                    type="text"
                    required
                    placeholder="e.g. Ike Chase Cam"
                  />
                </div>
                <div class="form-field">
                  <label for="channel-id">YouTube channel ID</label>
                  <input
                    id="channel-id"
                    name="channel_id"
                    type="text"
                    required
                    placeholder="UCqSk-ojoH2rgAuYadPLJgJA"
                    pattern="UC[\w-]{22}"
                    spellcheck="false"
                  />
                  <small class="form-hint"
                    >Paste the UC… ID from the channel page (starts with UC, 24 characters).</small
                  >
                </div>
                <div class="form-field">
                  <label for="notes">Notes</label>
                  <textarea id="notes" name="notes" placeholder="Optional notes"></textarea>
                </div>
                <div class="form-field form-field--checkbox">
                  <input id="enabled" name="enabled" type="checkbox" checked />
                  <label for="enabled">Enabled</label>
                </div>
                <p id="form-message" class="form-message" role="status" hidden></p>
                <div class="form-actions">
                  <button type="submit" class="btn btn--primary" id="form-submit">Save stream</button>
                  <button type="button" class="btn btn--secondary" id="form-cancel" hidden>
                    Cancel edit
                  </button>
                </div>
              </form>
            </div>
          </div>
        </aside>

        <section class="quad-view" aria-label="Quad view">
          <div id="quad-grid" class="quad-grid"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <p class="site-footer__tagline">HeartlandStormChaser · Streams</p>
      <div class="site-footer__auth" id="site-footer-auth">
        <span class="site-footer__auth-user" id="site-footer-auth-user" hidden></span>
        <a class="site-footer__auth-link" id="site-footer-sign-in" href="/login.html">Sign in</a>
        <button type="button" class="btn btn--secondary btn--small site-footer__auth-btn" id="site-footer-sign-out" hidden>Sign out</button>
      </div>
    </footer>

    <script src="/js/auth-footer.js"></script>
    <script src="/js/nav.js"></script>
    <script type="module" src="/js/broadcast/camera-dock-persist.js"></script>
    <script src="/js/chasers-streams.js"></script>
  </body>
</html>
