<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS Weather Overlay · HeartlandStormChaser</title>
    <link rel="stylesheet" href="/css/overlay-gps-weather.css" />
  </head>
  <body class="overlay-body">
    <div class="overlay-stage" id="overlay-root" aria-live="polite">
      <div class="overlay-bar" id="overlay-bar">
        <div class="overlay-bar__accent" id="warning-accent" aria-hidden="true"></div>

        <div class="overlay-bar__content">
          <div class="overlay-bar__travel">
            <div class="overlay-bar__route">
              <span class="overlay-dot overlay-dot--solid" aria-hidden="true"></span>
              <span class="overlay-bar__place" id="current-location">—</span>
              <span class="overlay-arrow" aria-hidden="true">→</span>
              <span class="overlay-dot overlay-dot--hollow" aria-hidden="true"></span>
              <span class="overlay-bar__place" id="target-location">—</span>
            </div>

            <div class="overlay-bar__metrics overlay-bar__metrics--travel">
              <div class="overlay-metric">
                <span class="overlay-metric__label">SPEED</span>
                <span class="overlay-metric__value" id="speed-value">0 MPH</span>
              </div>
              <div class="overlay-metric">
                <span class="overlay-metric__label">DIR</span>
                <span class="overlay-metric__value" id="direction-value">--</span>
              </div>
              <div class="overlay-metric">
                <span class="overlay-metric__label">ETA</span>
                <span class="overlay-metric__value" id="eta-value">--</span>
              </div>
            </div>
          </div>

          <div class="overlay-bar__weather">
            <div class="overlay-bar__metrics overlay-bar__metrics--weather-top">
              <div class="overlay-pill overlay-pill--temp">
                <span class="overlay-metric__label">TEMP</span>
                <span class="overlay-metric__value" id="temp-value">—</span>
              </div>
              <div class="overlay-pill">
                <span class="overlay-metric__label">WIND</span>
                <span class="overlay-metric__value" id="wind-value">—</span>
              </div>
            </div>

            <div class="overlay-bar__metrics overlay-bar__metrics--weather-bottom">
              <div class="overlay-metric">
                <span class="overlay-metric__label">DP</span>
                <span class="overlay-metric__value" id="dewpoint-value">—</span>
              </div>
              <div class="overlay-metric">
                <span class="overlay-metric__label">PRESSURE</span>
                <span class="overlay-metric__value" id="pressure-value">—</span>
              </div>
              <div class="overlay-metric">
                <span class="overlay-metric__label">RH</span>
                <span class="overlay-metric__value" id="humidity-value">—</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="overlay-empty overlay-empty--hidden" id="empty-state">
        No Platform GPS Source Selected
      </div>
    </div>

    <script src="/js/overlay-gps-weather.js"></script>
  </body>
</html>
