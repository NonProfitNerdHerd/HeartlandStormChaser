<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="WeatherFront radar and models embedded with platform GPS for HeartlandStormChaser"
    />
    <title>WeatherFront · HeartlandStormChaser</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/weatherfront.css" />
  </head>
  <body data-page="weatherfront" class="weatherfront-body">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-logo" href="/">HeartlandStormChaser</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="/" data-nav="home">Home</a>
          <a class="nav-link" href="/dashboard.html" data-nav="dashboard">Dashboard</a>
          <a class="nav-link" href="/gps.html" data-nav="gps">GPS</a>
          <a class="nav-link" href="/warnings.html" data-nav="warnings">Warnings</a>
          <a class="nav-link" href="/weatherfront" data-nav="weatherfront">WeatherFront</a>
          <a class="nav-link" href="/overlays.html" data-nav="overlays">Overlays</a>
          <a class="nav-link" href="/chases.html" data-nav="chases">Chases</a>
          <a class="nav-link" href="/chasers-streams.html" data-nav="chasers-streams"
            >Chasers Streams</a
          >
          <a class="nav-link" href="/settings.html" data-nav="settings">Settings</a>
        </nav>
      </div>
    </header>

    <main class="weatherfront-main">
      <div class="weatherfront-controls">
        <div class="weatherfront-controls__status">
          <span class="badge badge--muted" id="gps-status-badge">GPS —</span>
          <span class="weatherfront-controls__coords" id="gps-coords">Loading platform GPS…</span>
        </div>
      </div>

      <div class="weatherfront-frame-wrap">
        <div
          class="weatherfront-scale"
          id="weatherfront-scale"
          role="group"
          aria-label="WeatherFront display scale"
        >
          <span
            class="weatherfront-gps-bug"
            id="iframe-gps-bug"
            data-state="unknown"
            title="Waiting for iframe GPS capture status"
            aria-live="polite"
            >GPS?</span
          >
          <button type="button" class="weatherfront-scale__btn" data-scale="90">90%</button>
          <button type="button" class="weatherfront-scale__btn" data-scale="100">100%</button>
          <button type="button" class="weatherfront-scale__btn" data-scale="110">110%</button>
          <button type="button" class="weatherfront-scale__btn" data-scale="125">125%</button>
        </div>

        <div
          class="weatherfront-error"
          id="weatherfront-error"
          hidden
          role="alert"
        >
          <p class="weatherfront-error__title">WeatherFront could not be loaded in this page.</p>
          <p class="weatherfront-error__detail" id="weatherfront-error-detail"></p>
          <p class="weatherfront-error__actions">
            <button type="button" class="btn btn--secondary" id="weatherfront-retry-btn">
              Retry
            </button>
            <a
              class="btn btn--secondary"
              href="https://app.weatherfront.com/"
              target="_blank"
              rel="noopener noreferrer"
              >Open in new tab</a
            >
          </p>
        </div>

        <div class="weatherfront-frame-scaler" id="frame-scaler">
          <iframe
            id="weatherfront-frame"
            title="WeatherFront"
            src="/weatherfront-embed/"
            allow="geolocation; fullscreen; clipboard-read; clipboard-write"
            referrerpolicy="no-referrer-when-downgrade"
            loading="eager"
          ></iframe>
        </div>
      </div>
    </main>

    <script src="/js/nav.js"></script>
    <script src="/js/weatherfront.js"></script>
  </body>
</html>
