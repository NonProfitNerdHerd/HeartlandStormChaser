<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Chase trip details for HeartlandStormChaser" />
    <title>Chase details · HeartlandStormChaser</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/chases.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body data-page="chase-detail">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-logo" href="/">HeartlandStormChaser</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="nav-link" href="/" data-nav="home">Home</a>
          <a class="nav-link" href="/dashboard.html" data-nav="dashboard">Dashboard</a>
          <a class="nav-link" href="/gps.html" data-nav="gps">GPS</a>
          <a class="nav-link" href="/warnings.html" data-nav="warnings">Warnings</a>
          <a class="nav-link" href="/overlays.html" data-nav="overlays">Overlays</a>
          <a class="nav-link" href="/chases.html" data-nav="chases">Chases</a>
          <a class="nav-link" href="/chasers-streams.html" data-nav="chasers-streams">Chasers Streams</a>
          <a class="nav-link" href="/settings.html" data-nav="settings">Settings</a>
        </nav>
      </div>
    </header>

    <main class="site-main site-main--wide">
      <div class="chases-toolbar">
        <div>
          <a class="chases-back-link" href="/chases.html">← Back to chases</a>
          <h1 class="chases-title" id="chase-name">Chase details</h1>
          <p class="chases-subtitle" id="chase-meta">Loading…</p>
        </div>
        <div class="chases-toolbar__actions">
          <button type="button" class="btn btn--secondary" id="complete-btn" hidden>Mark completed</button>
          <button type="button" class="btn btn--danger" id="delete-btn">Delete chase</button>
        </div>
      </div>

      <div class="chase-detail-grid">
        <section class="chases-panel" aria-labelledby="chase-summary-heading">
          <h2 class="chases-panel__title" id="chase-summary-heading">Summary</h2>
          <dl class="chase-summary-list" id="chase-summary"></dl>
          <label class="chase-notes-label" for="chase-notes">Notes</label>
          <textarea class="chase-notes-input" id="chase-notes" rows="4" placeholder="Trip notes…"></textarea>
          <button type="button" class="btn btn--primary" id="save-notes-btn">Save notes</button>
          <p class="chase-message" id="notes-message" hidden></p>
        </section>

        <section class="chases-panel" aria-labelledby="expense-summary-heading">
          <h2 class="chases-panel__title" id="expense-summary-heading">Expenses</h2>
          <div class="expense-breakdown" id="expense-breakdown"></div>
          <p class="chase-total-expenses" id="expense-total"></p>
        </section>
      </div>

      <section class="chases-panel" aria-labelledby="chase-map-heading">
        <h2 class="chases-panel__title" id="chase-map-heading">GPS route</h2>
        <div class="chase-map" id="chase-map"></div>
      </section>

      <section class="chases-panel" aria-labelledby="expense-table-heading">
        <h2 class="chases-panel__title" id="expense-table-heading">Expense entries</h2>
        <div class="chases-table-wrap">
          <table class="chases-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="expenses-body">
              <tr><td colspan="5" class="chases-empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog class="chase-dialog" id="expense-dialog">
      <form method="dialog" class="chase-dialog__form" id="expense-form">
        <h3 class="chase-dialog__title" id="expense-dialog-title">Edit expense</h3>
        <label>
          Category
          <select id="expense-category" required>
            <option value="Gas">Gas</option>
            <option value="Food">Food</option>
            <option value="Hotel">Hotel</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>
          Amount
          <input type="number" id="expense-amount" min="0" step="0.01" required />
        </label>
        <label>
          Description
          <input type="text" id="expense-description" />
        </label>
        <label>
          Time
          <input type="datetime-local" id="expense-time" required />
        </label>
        <div class="chase-dialog__actions">
          <button type="button" class="btn btn--secondary" id="expense-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn--primary">Save</button>
        </div>
      </form>
    </dialog>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/chase-detail.js"></script>
  </body>
</html>
