<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to HeartlandStormChaser" />
    <title>Sign in · HeartlandStormChaser</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>
  <body class="login-body">
    <main class="login-card">
      <h1 class="login-card__title">HeartlandStormChaser</h1>
      <p class="login-card__subtitle">Sign in to continue</p>

      <form class="login-form" id="login-form">
        <label class="login-form__field">
          Username
          <input type="text" id="login-username" name="username" autocomplete="username" required />
        </label>
        <label class="login-form__field">
          Password
          <input
            type="password"
            id="login-password"
            name="password"
            autocomplete="current-password"
            required
          />
        </label>
        <p class="login-form__message" id="login-message" hidden></p>
        <button type="submit" class="btn btn--primary login-form__submit" id="login-submit-btn">
          Sign in
        </button>
      </form>
    </main>

    <script src="/js/login.js"></script>
  </body>
</html>
